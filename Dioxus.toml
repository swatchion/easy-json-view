# Dioxus CLI 配置。
# 注意：默认平台不在此声明——dx 从 Cargo.toml 的 [features] default 推断；
# 本项目 default = ["desktop"] → desktop = ["dioxus/desktop"]，故 `dx serve/build`
# 不带 --platform 时默认走桌面。Web 构建用 `dx build --platform web`。

[application]
# asset_dir / out_dir 采用默认值（assets/、目标平台各自的输出目录）。

[web.app]
title = "Easy Json View - JSON 格式化工具"

# dx bundle 0.7.9 对三平台（macOS/Linux/Windows）有两个必填字段，缺任一即报错退出
# （见 dioxus-cli src/cli/bundle.rs 的 is_none() 检查，仅这两项硬性必填）：
#   identifier：反向 DNS 包标识，三平台共用（macOS bundle id 等）。
#   publisher ：发布者/公司名，写入安装包元数据（如 Windows「发布者」）。
# icon：打包图标，非运行时窗口图标——运行时图标见 main.rs 的 with_window_icon。
[bundle]
identifier = "com.swatchion.easy-json-view"
publisher = "swatchion"
icon = ["assets/icon.png"]
