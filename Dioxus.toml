# Dioxus CLI 配置。
# 注意：默认平台不在此声明——dx 从 Cargo.toml 的 [features] default 推断；
# 本项目 default = ["desktop"] → desktop = ["dioxus/desktop"]，故 `dx serve/build`
# 不带 --platform 时默认走桌面。Web 构建用 `dx build --platform web`。

[application]
# asset_dir / out_dir 采用默认值（assets/、目标平台各自的输出目录）。

[web.app]
title = "Easy Json View - JSON 格式化工具"

# dx bundle 0.7.9 对三平台（macOS/Linux/Windows）有两个必填字段，缺任一即报错退出
# （见 dioxus-cli src/cli/bundle.rs 的 is_none() 检查，仅这两项硬性必填）：
#   identifier：反向 DNS 包标识，三平台共用（macOS bundle id 等）。
#   publisher ：发布者/公司名，写入安装包元数据（如 Windows「发布者」）。
# icon：打包图标，非运行时窗口图标——运行时图标见 main.rs 的 with_window_icon。
[bundle]
identifier = "com.swatchion.easy-json-view"
publisher = "swatchion"
# 多尺寸图标：dx 按像素尺寸装入 hicolor/<WxH>/apps/，原样复制不缩放，故须逐尺寸提供
# （由 assets/icon.svg 经 magick 生成的 8-bit RGBA）。安装后应用菜单/Dock 据此显示图标。
icon = [
  "assets/icon-32.png",
  "assets/icon-48.png",
  "assets/icon-64.png",
  "assets/icon-128.png",
  "assets/icon-256.png",
  "assets/icon-512.png",
]
short_description = "JSON 格式化/校验工具"
# 须为合法 freedesktop 主分类（写入 .desktop 的 Categories=）；构建后核对生成的 .desktop。
category = "Utility"

# Debian (.deb) 专属设置（字段名/表路径据 dioxus-cli 0.7.9 config/bundle.rs::DebianSettings 核验）。
# .deb 依赖系统 webkit 而非打包整套 WebView，故体积远小于 AppImage。
[bundle.deb]
# 运行时依赖：deb 安装时由 apt 解析。libwebkit2gtk-4.1-0 会传递拉取多数 GTK/soup 依赖；
# libxdo3 对应 tao/global-hotkey 链接的 -lxdo（精确包名构建时以 ldd 核对，必要时增删）。
depends = ["libwebkit2gtk-4.1-0", "libxdo3"]
section = "utils"
priority = "optional"
