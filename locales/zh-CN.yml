# 功能介绍（About）弹窗 —— 5 个差异化卖点。文案为初稿，待按产品口吻定稿。
about:
  button: 关于
  title: 为什么选择 Easy Json View？
  subtitle: 一款尊重你数据的 JSON 格式化工具。
  privacy_title: 不收集数据
  privacy_desc: 没有埋点、无需账号、不收集任何个人信息——数据绝不离开你的设备。
  local_title: 数据全本地
  local_desc: 历史与设置只保存在你的浏览器或设备上的本地配置文件中。
  bookmark_title: 收藏夹
  bookmark_desc: 把常用片段加星标置顶，历史再多也不会被挤掉。
  desktop_title: 原生桌面版
  desktop_desc: 可作为真正的桌面窗口运行——无浏览器、无服务端、完全离线。
  light_title: 极致轻量
  light_desc: 以 Rust 构建，内存占用极低，格式化即时响应。
  tech_stack: 由 Rust + Dioxus 倾力打造
  source: 在 GitHub 查看源码
